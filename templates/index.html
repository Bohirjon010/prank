<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Just a cool page</title>
  <link rel="stylesheet" href="../main.py">
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Arial;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;overflow:hidden}
    .container{text-align:center}
    #message{font-size:24px;opacity:1;transition:opacity 0.5s}
    .prank{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,0.85);z-index:9999;color:#fff}
    .btn{margin-top:20px;padding:10px 16px;border-radius:6px;background:#f1c40f;border:none;cursor:pointer;font-weight:600}
    .canvas{position:fixed;inset:0;pointer-events:none}
    .hidden{display:none}
  </style>
</head>
<body>
  <canvas id="confetti" class="canvas"></canvas>
  <div class="container">
    <div id="message">Mening saytimga xush kelibsiz!</div>
    <button id="start" class="btn">Meni bosing..</button>
  </div>

  <div id="overlay" class="prank hidden">
    <h1 style="font-size:48px;margin:0">PRANK!</h1>
    <p style="margin:8px 0 0">Hech qanaqa sayt yoq, Bu Do'stona hazil endi 😄</p>
    <button id="stop" class="btn">Stop</button>
  </div>

  <script>
    const start = document.getElementById('start');
    const overlay = document.getElementById('overlay');
    const stop = document.getElementById('stop');
    const message = document.getElementById('message');

    function playBeep(){
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth';
      o.frequency.value = 880;
      g.gain.value = 0;
      o.connect(g);
      g.connect(ctx.destination);
      o.start();
      g.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 1.2);
      o.stop(ctx.currentTime + 1.3);
    }

    function showOverlay(){
      overlay.classList.remove('hidden');
      message.style.opacity = '0.2';
      startConfetti();
      playBeep();
      setTimeout(playBeep, 400);
      setTimeout(playBeep, 800);
    }

    start.addEventListener('click', ()=> {
      start.disabled = true;
      message.textContent = 'Loading...';
      setTimeout(showOverlay, 1200);
    });

    stop.addEventListener('click', ()=> {
      overlay.classList.add('hidden');
      message.style.opacity = '1';
      start.disabled = false;
      stopConfetti();
    });

    let confettiTimer;
    function startConfetti(){
      const c = document.getElementById('confetti');
      const ctx = c.getContext('2d');
      function resize(){ c.width = innerWidth; c.height = innerHeight; }
      window.addEventListener('resize', resize);
      resize();
      const pieces = [];
      for(let i=0;i<150;i++){
        pieces.push({
          x: Math.random()*c.width,
          y: Math.random()*c.height - c.height,
          w: 6+Math.random()*8,
          h: 8+Math.random()*8,
          r: Math.random()*360,
          color: `hsl(${Math.random()*360} 90% 60%)`,
          speed: 1+Math.random()*3,
          rotSpeed: Math.random()*10-5
        });
      }
      function draw(){
        ctx.clearRect(0,0,c.width,c.height);
        for(const p of pieces){
          ctx.save();
          ctx.translate(p.x,p.y);
          ctx.rotate(p.r*Math.PI/180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
          ctx.restore();
          p.y += p.speed;
          p.r += p.rotSpeed;
          if(p.y > c.height + 20){
            p.y = -20;
            p.x = Math.random()*c.width;
          }
        }
        confettiTimer = requestAnimationFrame(draw);
      }
      confettiTimer = requestAnimationFrame(draw);
    }
    function stopConfetti(){
      if(confettiTimer) cancelAnimationFrame(confettiTimer);
      const c = document.getElementById('confetti');
      const ctx = c.getContext('2d');
      ctx.clearRect(0,0,c.width,c.height);
    }
  </script>
</body>
</html>
